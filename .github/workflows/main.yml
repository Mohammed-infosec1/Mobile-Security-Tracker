name: Global Security Audit

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-play-scraper

      - name: Run Security Audit Script
        run: |
          python check_updates.py > SECURITY_REPORT.md

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add SECURITY_REPORT.md
          git commit -m "Auto-update: Security Audit $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
